name: Performance Tests

on:
  workflow_dispatch:  # Allow manual trigger on any branch
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'  # Run on version tags like v0.1.0
    paths:
      - 'raglet/**'
      - 'performance/performance_test.py'
      - '.github/workflows/performance.yml'

jobs:
  performance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
      
      - name: Run performance tests
        id: performance
        run: |
          cd performance
          python performance_test.py \
            --sizes 100 1000 10000 \
            --formats sqlite directory \
            --output performance_results.json
        continue-on-error: true
      
      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ matrix.python-version }}
          path: |
            performance/performance_results.json
            performance/test_data/
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Parse and display results
        if: always()
        run: |
          cd performance
          if [ -f performance_results.json ]; then
            echo "## Performance Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            python3 parse_results.py >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## Performance Test Failed" >> $GITHUB_STEP_SUMMARY
            echo "No results file generated." >> $GITHUB_STEP_SUMMARY
          fi
